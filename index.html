<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Organizer</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, "Noto Sans KR", sans-serif;
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 24px 60px;
      background: #faf9f7;
      color: #222;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    .description {
      color: #666;
      margin: 0 0 30px;
    }

    .panel {
      background: white;
      border: 1px solid #e6e1da;
      border-radius: 16px;
      padding: 22px;
      margin-bottom: 20px;
    }

    .hidden {
      display: none;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 12px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 11px 17px;
      font-size: 14px;
      cursor: pointer;
      background: #243447;
      color: white;
      white-space: nowrap;
    }

    button:hover {
      background: #34495e;
    }

    .folder-info {
      margin: 14px 0 4px;
      font-weight: bold;
    }

    .count {
      color: #666;
      font-size: 14px;
      margin-bottom: 14px;
    }

    .empty {
      color: #888;
      margin-top: 18px;
      font-size: 14px;
    }

    .file-item,
    .designer-item {
      background: #faf9f7;
      border: 1px solid #ece7e1;
      border-radius: 9px;
      padding: 10px 12px;
      margin-bottom: 7px;
      font-size: 14px;
    }

    .search-box {
      width: 100%;
      border: 1px solid #d9d3cc;
      border-radius: 10px;
      padding: 11px 13px;
      font-size: 14px;
      margin: 8px 0 15px;
    }

    .search-box:focus,
    .designer-input:focus {
      outline: 2px solid #243447;
      border-color: transparent;
    }

    .list {
      max-height: 390px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .note {
      color: #777;
      font-size: 13px;
      margin: 6px 0 0;
    }

    .sort-row {
      border: 1px solid #e6e1da;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      background: #fff;
    }

    .source-file {
      font-weight: bold;
      margin-bottom: 13px;
      word-break: break-all;
    }

    .sort-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      align-items: start;
    }

    .field-label {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }

    .designer-input {
      width: 100%;
      border: 1px solid #d9d3cc;
      border-radius: 9px;
      padding: 10px 12px;
      font-size: 14px;
    }

    .suggestions {
      margin-top: 5px;
      border: 1px solid #e0dad2;
      border-radius: 9px;
      overflow: hidden;
      background: white;
    }

    .suggestion {
      width: 100%;
      text-align: left;
      background: white;
      color: #222;
      border-radius: 0;
      padding: 10px 12px;
      border-bottom: 1px solid #eee9e3;
    }

    .suggestion:last-child {
      border-bottom: none;
    }

    .suggestion:hover {
      background: #f3f0eb;
    }

    .no-match {
      color: #888;
      background: #faf9f7;
      border: 1px solid #ece7e1;
      border-radius: 9px;
      padding: 10px 12px;
      margin-top: 5px;
      font-size: 13px;
    }

    .preview {
      background: #f5f2ee;
      border-radius: 9px;
      padding: 11px 12px;
      min-height: 42px;
      font-size: 14px;
      word-break: break-all;
    }

    .preview.pending {
      color: #888;
    }

    .preview.existing {
      color: #1e4d3b;
    }

    .preview.single {
      color: #694a12;
    }

    .selected-label {
      font-size: 12px;
      color: #1e4d3b;
      margin-top: 6px;
    }

    @media (max-width: 760px) {
      .sort-grid {
        grid-template-columns: 1fr;
      }

      .panel-header {
        display: block;
      }

      .panel-header button {
        margin-top: 12px;
      }
    }
  </style>
</head>

<body>
  <h1>PDF Organizer</h1>
  <p class="description">다운로드된 PDF와 기존 디자이너 폴더를 연결합니다.</p>

  <section class="panel">
    <div class="panel-header">
      <h2>1. 새 다운로드 폴더</h2>
      <button id="selectDownloadFolderButton">다운로드 폴더 선택</button>
    </div>

    <div id="downloadFolderName" class="folder-info"></div>
    <div id="downloadFileCount" class="count"></div>
    <div id="downloadFileList" class="list"></div>
  </section>

  <section class="panel">
    <div class="panel-header">
      <div>
        <h2>2. 기존 패턴 폴더</h2>
        <p class="note">!로 시작하는 관리용 폴더는 디자이너 목록에서 자동 제외합니다.</p>
      </div>
      <button id="selectLibraryFolderButton">패턴 폴더 선택</button>
    </div>

    <div id="libraryFolderName" class="folder-info"></div>
    <div id="designerFolderCount" class="count"></div>

    <input
      type="text"
      id="designerSearch"
      class="search-box"
      placeholder="전체 폴더 검색: Knitree, 마요, Lauren..."
      disabled
    >

    <div id="designerFolderList" class="list"></div>
  </section>

  <section id="sortingPanel" class="panel hidden">
    <h2>3. 새 PDF 정리 미리보기</h2>
    <p class="note">
      기존 폴더를 검색해 선택하거나, 새 디자이너라면 사용할 이름을 직접 입력하세요.
      아직 실제 파일은 이동하지 않습니다.
    </p>

    <div id="sortingList" style="margin-top: 18px;"></div>
  </section>

  <script>
    const selectDownloadFolderButton = document.getElementById("selectDownloadFolderButton");
    const downloadFolderName = document.getElementById("downloadFolderName");
    const downloadFileCount = document.getElementById("downloadFileCount");
    const downloadFileList = document.getElementById("downloadFileList");

    const selectLibraryFolderButton = document.getElementById("selectLibraryFolderButton");
    const libraryFolderName = document.getElementById("libraryFolderName");
    const designerFolderCount = document.getElementById("designerFolderCount");
    const designerSearch = document.getElementById("designerSearch");
    const designerFolderList = document.getElementById("designerFolderList");

    const sortingPanel = document.getElementById("sortingPanel");
    const sortingList = document.getElementById("sortingList");

    let downloadDirectoryHandle = null;
    let libraryDirectoryHandle = null;
    let downloadFiles = [];
    let designerFolders = [];

    selectDownloadFolderButton.addEventListener("click", async () => {
      try {
        downloadDirectoryHandle = await window.showDirectoryPicker();

        downloadFolderName.textContent = `선택한 폴더: ${downloadDirectoryHandle.name}`;
        downloadFileList.innerHTML = "";
        downloadFiles = [];

        for await (const entry of downloadDirectoryHandle.values()) {
          if (
            entry.kind === "file" &&
            entry.name.toLowerCase().endsWith(".pdf")
          ) {
            downloadFiles.push({
              name: entry.name,
              handle: entry,
              inputName: "",
              selectedFolder: null
            });
          }
        }

        downloadFiles.sort((a, b) => a.name.localeCompare(b.name, "ko"));

        downloadFileCount.textContent = `PDF 파일 ${downloadFiles.length}개`;

        if (downloadFiles.length === 0) {
          downloadFileList.innerHTML = `<p class="empty">이 폴더에 PDF 파일이 없습니다.</p>`;
          sortingPanel.classList.add("hidden");
          return;
        }

        downloadFiles.forEach((file) => {
          const item = document.createElement("div");
          item.className = "file-item";
          item.textContent = file.name;
          downloadFileList.appendChild(item);
        });

        renderSortingRows();

      } catch (error) {
        if (error.name !== "AbortError") {
          alert("다운로드 폴더를 읽는 중 오류가 발생했습니다.");
          console.error(error);
        }
      }
    });

    selectLibraryFolderButton.addEventListener("click", async () => {
      try {
        libraryDirectoryHandle = await window.showDirectoryPicker();

        libraryFolderName.textContent = `선택한 폴더: ${libraryDirectoryHandle.name}`;
        designerFolderList.innerHTML = "";
        designerSearch.value = "";
        designerFolders = [];

        for await (const entry of libraryDirectoryHandle.values()) {
          if (
            entry.kind === "directory" &&
            !entry.name.startsWith("!")
          ) {
            designerFolders.push(entry.name);
          }
        }

        designerFolders.sort((a, b) => a.localeCompare(b, "ko"));

        designerFolderCount.textContent = `디자이너 폴더 ${designerFolders.length}개`;
        designerSearch.disabled = false;

        renderDesignerFolders(designerFolders);
        renderSortingRows();

      } catch (error) {
        if (error.name !== "AbortError") {
          alert("기존 패턴 폴더를 읽는 중 오류가 발생했습니다.");
          console.error(error);
        }
      }
    });

    designerSearch.addEventListener("input", () => {
      const keyword = designerSearch.value.trim().toLowerCase();

      const filteredFolders = designerFolders.filter((folderName) =>
        folderName.toLowerCase().includes(keyword)
      );

      renderDesignerFolders(filteredFolders);
    });

    function renderDesignerFolders(folders) {
      designerFolderList.innerHTML = "";

      if (folders.length === 0) {
        designerFolderList.innerHTML = `<p class="empty">검색 결과가 없습니다.</p>`;
        return;
      }

      folders.forEach((folderName) => {
        const item = document.createElement("div");
        item.className = "designer-item";
        item.textContent = folderName;
        designerFolderList.appendChild(item);
      });
    }

    function renderSortingRows() {
      sortingList.innerHTML = "";

      if (downloadFiles.length === 0) {
        sortingPanel.classList.add("hidden");
        return;
      }

      sortingPanel.classList.remove("hidden");

      downloadFiles.forEach((file, index) => {
        const row = document.createElement("div");
        row.className = "sort-row";

        const sourceFile = document.createElement("div");
        sourceFile.className = "source-file";
        sourceFile.textContent = file.name;

        const grid = document.createElement("div");
        grid.className = "sort-grid";

        const inputArea = document.createElement("div");

        const inputLabel = document.createElement("label");
        inputLabel.className = "field-label";
        inputLabel.textContent = "저장할 디자이너 폴더 검색 / 새 디자이너명 입력";

        const input = document.createElement("input");
        input.className = "designer-input";
        input.type = "text";
        input.placeholder = "예: Knitree, 마요, New Designer";
        input.value = file.inputName;

        const selectedLabel = document.createElement("div");
        selectedLabel.className = "selected-label";

        if (file.selectedFolder) {
          selectedLabel.textContent = `기존 폴더 선택됨: ${file.selectedFolder}`;
        }

        const suggestions = document.createElement("div");

        input.addEventListener("input", () => {
          file.inputName = input.value.trim();
          file.selectedFolder = null;
          selectedLabel.textContent = "";

          renderSuggestions(file, suggestions, input, selectedLabel, preview);
          updatePreview(file, preview);
        });

        input.addEventListener("focus", () => {
          renderSuggestions(file, suggestions, input, selectedLabel, preview);
        });

        inputArea.appendChild(inputLabel);
        inputArea.appendChild(input);
        inputArea.appendChild(selectedLabel);
        inputArea.appendChild(suggestions);

        const previewArea = document.createElement("div");

        const previewLabel = document.createElement("label");
        previewLabel.className = "field-label";
        previewLabel.textContent = "저장 결과 미리보기";

        const preview = document.createElement("div");
        preview.className = "preview pending";

        previewArea.appendChild(previewLabel);
        previewArea.appendChild(preview);

        grid.appendChild(inputArea);
        grid.appendChild(previewArea);

        row.appendChild(sourceFile);
        row.appendChild(grid);
        sortingList.appendChild(row);

        updatePreview(file, preview);
      });
    }

    function renderSuggestions(file, container, input, selectedLabel, preview) {
      container.innerHTML = "";

      const keyword = file.inputName.toLowerCase();

      if (!keyword || designerFolders.length === 0) {
        return;
      }

      const matches = designerFolders
        .filter((folderName) =>
          folderName.toLowerCase().includes(keyword)
        )
        .slice(0, 8);

      if (matches.length === 0) {
        const noMatch = document.createElement("div");
        noMatch.className = "no-match";
        noMatch.textContent = "기존 폴더 없음 — 새 디자이너명으로 저장하면 !zz_Singles 경로가 제안됩니다.";
        container.appendChild(noMatch);
        return;
      }

      const suggestionBox = document.createElement("div");
      suggestionBox.className = "suggestions";

      matches.forEach((folderName) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "suggestion";
        button.textContent = folderName;

        button.addEventListener("click", () => {
          file.selectedFolder = folderName;
          file.inputName = folderName;
          input.value = folderName;
          selectedLabel.textContent = `기존 폴더 선택됨: ${folderName}`;
          container.innerHTML = "";
          updatePreview(file, preview);
        });

        suggestionBox.appendChild(button);
      });

      container.appendChild(suggestionBox);
    }

    function updatePreview(file, preview) {
      preview.className = "preview";

      if (file.selectedFolder) {
        preview.classList.add("existing");
        preview.textContent = `${file.selectedFolder}/${file.name}`;
        return;
      }

      if (file.inputName) {
        preview.classList.add("single");
        preview.textContent = `!zz_Singles/${file.inputName}_${file.name}`;
        return;
      }

      preview.classList.add("pending");
      preview.textContent = "디자이너 폴더를 선택하거나 새 디자이너명을 입력하세요.";
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Organizer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 850px;
      margin: 40px auto;
      padding: 0 20px;
      background: #faf9f7;
      color: #222;
    }

    h1 {
      margin-bottom: 8px;
    }

    .description {
      color: #666;
      margin-bottom: 28px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 15px;
      cursor: pointer;
      background: #243447;
      color: white;
    }

    button:hover {
      background: #34495e;
    }

    #folderName {
      margin: 20px 0 10px;
      font-weight: bold;
    }

    #fileCount {
      color: #666;
      margin-bottom: 16px;
    }

    .file-item {
      background: white;
      border: 1px solid #e5e1dc;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 8px;
    }

    .empty {
      color: #888;
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <h1>PDF Organizer</h1>
  <p class="description">새로 다운로드한 PDF 폴더를 선택하세요.</p>

  <button id="selectFolderButton">다운로드 폴더 선택</button>

  <div id="folderName"></div>
  <div id="fileCount"></div>
  <div id="fileList"></div>

  <script>
    const selectFolderButton = document.getElementById("selectFolderButton");
    const folderName = document.getElementById("folderName");
    const fileCount = document.getElementById("fileCount");
    const fileList = document.getElementById("fileList");

    selectFolderButton.addEventListener("click", async () => {
      try {
        const directoryHandle = await window.showDirectoryPicker();

        folderName.textContent = `선택한 폴더: ${directoryHandle.name}`;
        fileList.innerHTML = "";

        const pdfFiles = [];

        for await (const entry of directoryHandle.values()) {
          if (
            entry.kind === "file" &&
            entry.name.toLowerCase().endsWith(".pdf")
          ) {
            pdfFiles.push(entry.name);
          }
        }

        pdfFiles.sort((a, b) => a.localeCompare(b));

        fileCount.textContent = `PDF 파일 ${pdfFiles.length}개`;

        if (pdfFiles.length === 0) {
          fileList.innerHTML = `<p class="empty">이 폴더에 PDF 파일이 없습니다.</p>`;
          return;
        }

        pdfFiles.forEach((fileName) => {
          const item = document.createElement("div");
          item.className = "file-item";
          item.textContent = fileName;
          fileList.appendChild(item);
        });

      } catch (error) {
        if (error.name !== "AbortError") {
          alert("폴더를 읽는 중 오류가 발생했습니다.");
          console.error(error);
        }
      }
    });
  </script>
</body>
</html>
